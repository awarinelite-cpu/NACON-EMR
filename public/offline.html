<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>NACON MRS — Offline</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',system-ui,sans-serif;background:#0B1F3A;color:#e2e8f0;
      display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .card{background:#0f2d52;border:1px solid #1e4976;border-radius:16px;
      padding:32px 24px;text-align:center;max-width:360px;width:100%}
    img{width:72px;height:72px;border-radius:50%;margin-bottom:20px;opacity:.9}
    h1{font-size:18px;font-weight:700;margin-bottom:8px}
    p{font-size:13px;color:#94a3b8;line-height:1.6;margin-bottom:24px}
    button{background:#1d6fa4;border:none;color:#fff;padding:10px 24px;
      border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;width:100%}
    button:active{opacity:.8}
  </style>
</head>
<body>
  <div class="card">
    <img src="/logo192.png" alt="NACON MRS"/>
    <h1>You're offline</h1>
    <p>No internet connection. Check your network and try again. Data you've already loaded is still available.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
